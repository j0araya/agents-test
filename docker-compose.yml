version: '3.9'

services:
  postgres:
    image: postgres:15-alpine
    container_name: chile_atlas_db
    environment:
      POSTGRES_DB: chile_atlas
      POSTGRES_USER: chile
      POSTGRES_PASSWORD: chile_dev
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U chile -d chile_atlas']
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
