version: '3.9'

services:
  mongo:
    image: mongo:7
    container_name: chile_atlas_db
    environment:
      MONGO_INITDB_DATABASE: chile_atlas
    ports:
      - '27017:27017'
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ['CMD', 'mongosh', '--eval', "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  mongo_data:
