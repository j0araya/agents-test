# Base compose — shared service definitions.
# Never use alone. Always run with an override:
#   Dev:  docker compose -f docker-compose.yml -f docker-compose.dev.yml up
#   Prod: docker compose -f docker-compose.yml -f docker-compose.prod.yml up

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: chile_atlas_backend
    ports:
      - '3001:3001'
    restart: unless-stopped

  frontend:
    build:
      context: ./front
      dockerfile: Dockerfile
    container_name: chile_atlas_frontend
    ports:
      - '80:80'
    restart: unless-stopped
    depends_on:
      - backend
